# Loads default set of integrations. Do not remove.
default_config:
logger:
  default: info
# ZHA Toolkit
zha_toolkit:
# LCARS Clock
zha:
  custom_quirks_path: /config/custom_zha_quirks/

# Integrating GIT support for HA config YAML files - https://github.com/dermotcanniffe/HAConfig - via SSH
shell_command:
  git_update: 'cd /config && git add . && git commit -m "Config update: $(date "+%Y-%m-%d %H:%M")" && git push origin main'

sensor:
