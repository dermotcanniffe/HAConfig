# SigEnergy Modbus Integration
homeassistant:
  packages: !include_dir_named packages

# Grafana's Prometheus Exporter
#
prometheus:

#Templates
template:
  # Weather/Temperature template
  - trigger:
      - trigger: time_pattern
        minutes: /1
    action:
      - action: weather.get_forecasts
        data:
          type: hourly
        target:
          entity_id: weather.home
        response_variable: hourly
    sensor:
      - name: Temperature forecast next hour
        unique_id: temperature_forecast_next_hour
        state: "{{ hourly['weather.home'].forecast[0].temperature }}"

  - sensor:
      name: "Estimated Lux"
      unique_id: "estimated_lux_sensor"
      unit_of_measurement: "lx"
      state_class: "measurement"
      # The formula assumes a standard Luminous Efficacy for sunlight of ~100 lumens per Watt of irradiance.
      # Solar Irradiance (W/m²) = Power Output (W) / Efficiency / Area (m²)
      # Lux (lx) = Solar Irradiance (W/m²) * Luminous Efficacy (lm/W)
      # Resulting formula: Lux = (Power / 0.19 / Area) * 100
      # Documentation comments are safe here
      state: >
        {% set power_w = states('sensor.sigen_pv_power') | float(0) %}
        {% set efficiency = 0.19 %}
        {% set panel_area_sq_m = 1.6 %}
        {% set luminous_efficacy = 100 %}
        {% if power_w > 0 %}
          {{ ((power_w / efficiency / panel_area_sq_m) * luminous_efficacy) | round(0) }}
        {% else %}
          0
        {% endif %}

  - sensor:
      - name: "Battery Type Inventory"
        unique_id: battery_type_inventory
        state: "Active"
        attributes:
          lookup: >
            {% set data = {
              "sensor.kitchen_motion_battery": "CR2032",
              "sensor.living_room_switch_battery": "CR2032",
              "sensor.hallway_leak_battery": "AAA",
              "sensor.bedroom_temp_battery": "AAA"
            } %}
            {{ data | to_json }}

  - sensor:
      - name: "Total Battery Devices"
        unique_id: total_battery_devices
        icon: mdi:battery-check
        unit_of_measurement: "devices"
        state: >
          {# Count sensors with device_class battery, including unavailable ones #}
          {{ states.sensor 
            | selectattr('attributes.device_class', 'defined')
            | selectattr('attributes.device_class', 'eq', 'battery')
            | map(attribute='entity_id')
            | list | count }}

  - sensor:
      - name: "Batteries to Replace"
        unique_id: batteries_to_replace
        state: >
          {% set low_threshold = 20 %}
          {% set entities = states.sensor 
            | selectattr('attributes.device_id', 'defined')
            | selectattr('attributes.device_class', 'eq', 'battery')
            | select('test', 'any', [
                ('state', 'in', ['unavailable', 'unknown']),
                ('state', 'lt', low_threshold | string)
              ])
            | map(attribute='entity_id') | list %}
          {{ entities | count }}
        attributes:
          shopping_list: >
            {% set inventory = state_attr('sensor.battery_type_inventory', 'lookup') %}
            {% set low_threshold = 20 %}
            {% set dead_entities = states.sensor 
              | selectattr('attributes.device_class', 'eq', 'battery')
              | select('test', 'any', [
                  ('state', 'in', ['unavailable', 'unknown']),
                  ('state', 'lt', low_threshold | string)
                ])
              | map(attribute='entity_id') | list %}

            {% set ns = namespace(counts={}) %}
            {% for entity in dead_entities %}
              {% set b_type = inventory.get(entity, 'Unknown') %}
              {% set ns.counts = dict(ns.counts, **{b_type: ns.counts.get(b_type, 0) + 1}) %}
            {% endfor %}

            {% for b_type, count in ns.counts.items() %}
              {{ count }}x {{ b_type }}{% if not loop.last %}, {% endif %}
            {% endfor %}

# Configured InfluxDB to take time-series metrics
influxdb:
  host: 192.168.0.35
  port: 8086
  database: homeassistant
  username: adminha
  password: adminha
  max_retries: 3
  default_measurement: state
  # Add specific entities to track if needed
