# SigEnergy Modbus Integration
homeassistant:
  packages: !include_dir_named packages

# Grafana's Prometheus Exporter
#
prometheus:

#Templates
template:
  # Weather/Temperature template
  - trigger:
      - trigger: time_pattern
        minutes: /1
    action:
      - action: weather.get_forecasts
        data:
          type: hourly
        target:
          entity_id: weather.home
        response_variable: hourly
    sensor:
      - name: Temperature forecast next hour
        unique_id: temperature_forecast_next_hour
        state: "{{ hourly['weather.home'].forecast[0].temperature }}"

  - sensor:
      name: "Estimated Lux"
      unique_id: "estimated_lux_sensor"
      unit_of_measurement: "lx"
      state_class: "measurement"
      # The formula assumes a standard Luminous Efficacy for sunlight of ~100 lumens per Watt of irradiance.
      # Solar Irradiance (W/m²) = Power Output (W) / Efficiency / Area (m²)
      # Lux (lx) = Solar Irradiance (W/m²) * Luminous Efficacy (lm/W)
      # Resulting formula: Lux = (Power / 0.19 / Area) * 100
      # Documentation comments are safe here
      state: >
        {% set power_w = states('sensor.sigen_pv_power') | float(0) %}
        {% set efficiency = 0.19 %}
        {% set panel_area_sq_m = 1.6 %}
        {% set luminous_efficacy = 100 %}
        {% if power_w > 0 %}
          {{ ((power_w / efficiency / panel_area_sq_m) * luminous_efficacy) | round(0) }}
        {% else %}
          0
        {% endif %}
# Configured InfluxDB to take time-series metrics
influxdb:
  host: 192.168.0.35
  port: 8086
  database: homeassistant
  username: adminha
  password: adminha
  max_retries: 3
  default_measurement: state
  # Add specific entities to track if needed
